function kabelkanalCost(meter, sizeId) {
  const size = KABELKANAL_SIZES.find((s) => s.id === sizeId) || KABELKANAL_SIZES[4];
  const pieces = kabelkanalStueck(meter);
  if (pieces === 0) return { pieces: 0, cost: 0, size };

}
function kondensatschlauchCost(meter, typeId) {

            <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>Material (EK {eur(materialBasis)} + {materialAufschlag}%)</span><span>{eur(materialMitAufschlag)}</span></div>
            <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>Fertigungslohn</span><span>{eur(fertigungslohn)}</span></div>
            <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>Zulagen</span><span>{eur(zulagenSumme)}</span></div>
          </div>
          <div style={{ borderTop: `1px solid ${C.border}` }} className="mt-3 pt-3 flex justify-between items-baseline">
            <span className="font-display text-xs uppercase tracking-wide" style={{ color: C.ink }}>Angebotssumme (netto)</span>
            <span className="font-mono text-2xl font-bold" style={{ color: C.gold }}>{eur(gesamtNetto)}</span>
          </div>
          <div style={{ borderTop: `1px solid ${C.border}` }} className="mt-3 pt-3 space-y-1.5 text-sm font-mono">
            <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>Wareneinsatz (reiner EK)</span><span>−{eur(wareneinsatz)}</span></div>
            <div className="pt-1 space-y-1">
              <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>↳ Gewinn Gerät</span><span style={{ color: C.profit }}>{eur(gewinnGeraet)}</span></div>
              <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>↳ Gewinn Kleinmaterial</span><span style={{ color: C.profit }}>{eur(gewinnMaterial)}</span></div>
              <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>↳ Fertigungslohn</span><span style={{ color: C.profit }}>{eur(fertigungslohn)}</span></div>
              <div className="flex justify-between"><span className="font-body" style={{ color: C.inkDim }}>↳ Zulagen</span><span style={{ color: C.profit }}>{eur(zulagenSumme)}</span></div>
            </div>
            <div className="flex justify-between items-baseline pt-2" style={{ borderTop: `1px solid ${C.border}` }}>
              <span className="font-display text-xs uppercase tracking-wide" style={{ color: C.profit }}>Gewinn gesamt</span>
              <span className="font-mono text-xl font-bold" style={{ color: C.profit }}>{eur(gewinn)}</span>
            </div>
            <div className="text-right text-[11px] font-mono" style={{ color: C.inkDim }}>{gewinnMargeProzent.toFixed(1)}% Marge vom Angebot</div>
          </div>
        </div>
        <div className="mt-4 text-center text-[10px] font-body" style={{ color: C.inkDim }}>
          Alle Preise netto · EK lt. Preisliste 2026 / Hornbach (umgerechnet)
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<KlimaKalkulator />);
</script>
</body>
</html>
